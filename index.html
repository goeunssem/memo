<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 2학년 수학 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            overflow: hidden;
            touch-action: manipulation;
        }
        .canvas-confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .bubble-btn {
            transition: transform 0.1s active;
        }
        .bubble-btn:active {
            transform: scale(0.95);
        }
        .card-bounce {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <canvas id="confetti" class="canvas-confetti"></canvas>

    <!-- Main Game Container -->
    <div id="game-container" class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border-8 border-yellow-300 relative z-10 fade-in">
        <!-- Score Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="bg-pink-100 text-pink-600 px-4 py-2 rounded-full text-xl border-2 border-pink-200">
                점수: <span id="score">0</span>점
            </div>
            <div class="bg-blue-100 text-blue-600 px-4 py-2 rounded-full text-xl border-2 border-blue-200">
                Level: 2학년
            </div>
        </div>

        <!-- Problem Display -->
        <div class="text-center py-10 card-bounce">
            <h1 id="question" class="text-6xl font-bold text-gray-700 tracking-wider">
                10 + 20 = ?
            </h1>
        </div>

        <!-- Input Section -->
        <div class="space-y-4">
            <input type="number" id="answer-input" placeholder="정답을 써보세요!" 
                class="w-full text-3xl text-center p-4 rounded-2xl border-4 border-purple-200 focus:border-purple-400 outline-none transition-colors"
                autofocus>
            
            <button onclick="checkAnswer()" 
                class="w-full bg-yellow-400 hover:bg-yellow-500 text-white text-3xl py-4 rounded-2xl shadow-lg border-b-8 border-yellow-600 active:border-b-0 active:translate-y-2 transition-all bubble-btn">
                정답 확인!
            </button>
        </div>

        <!-- Feedback Message -->
        <div id="feedback" class="mt-6 text-center text-2xl font-bold h-8 transition-opacity duration-300 opacity-0">
            참 잘했어요! 🌟
        </div>
    </div>

    <!-- UI Buttons -->
    <div class="mt-8 flex gap-4">
        <button onclick="newGame()" class="bg-white text-gray-600 px-6 py-2 rounded-full shadow border-2 border-gray-200 hover:bg-gray-50">
            새로 시작
        </button>
    </div>

    <script>
        let score = 0;
        let currentAnswer = 0;
        const scoreEl = document.getElementById('score');
        const questionEl = document.getElementById('question');
        const inputEl = document.getElementById('answer-input');
        const feedbackEl = document.getElementById('feedback');
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');

        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Confetti Particle System
        let particles = [];
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + 10,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    speedX: Math.random() * 6 - 3,
                    speedY: Math.random() * -15 - 10,
                    gravity: 0.3
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += p.gravity;
                
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.y > canvas.height + 20) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateConfetti);
        }
        animateConfetti();

        // Game Logic
        function generateQuestion() {
            // 2학년 수준: 100까지의 덧셈과 뺄셈
            const type = Math.random() > 0.5 ? '+' : '-';
            let num1, num2;

            if (type === '+') {
                num1 = Math.floor(Math.random() * 80) + 1; // 1~80
                num2 = Math.floor(Math.random() * (99 - num1)) + 1; // 합이 100 안 넘게
                currentAnswer = num1 + num2;
            } else {
                num1 = Math.floor(Math.random() * 90) + 10; // 10~99
                num2 = Math.floor(Math.random() * num1) + 1; // 결과가 음수 안 되게
                currentAnswer = num1 - num2;
            }

            questionEl.innerText = `${num1} ${type} ${num2} = ?`;
            inputEl.value = '';
            inputEl.focus();
        }

        function checkAnswer() {
            const userAnswer = parseInt(inputEl.value);
            
            if (userAnswer === currentAnswer) {
                // Correct
                score += 10;
                scoreEl.innerText = score;
                showFeedback("참 잘했어요! 🌟", "text-green-500");
                createConfetti();
                setTimeout(generateQuestion, 1500);
            } else {
                // Wrong
                showFeedback("다시 한번 생각해봐요! 💪", "text-orange-500");
                inputEl.value = '';
                inputEl.focus();
            }
        }

        function showFeedback(text, colorClass) {
            feedbackEl.innerText = text;
            feedbackEl.className = `mt-6 text-center text-3xl font-bold transition-opacity duration-300 opacity-100 ${colorClass}`;
            
            setTimeout(() => {
                feedbackEl.style.opacity = '0';
            }, 1200);
        }

        function newGame() {
            score = 0;
            scoreEl.innerText = score;
            generateQuestion();
        }

        // Enter key support
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        // Initialize
        generateQuestion();
    </script>
</body>
</html>
